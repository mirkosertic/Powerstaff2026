spring:
  application:
    name: powerstaff
  main:
    allow-bean-definition-overriding: true

  # Flyway – Schema-Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Automatische Schema-Generierung ist explizit deaktiviert (ADR-008)
  sql:
    init:
      mode: never

  # Thymeleaf
  thymeleaf:
    cache: true
    encoding: UTF-8

  ai:
    mcp:
      client:
        streamable-http:
          connections:
            lucene-search:
              url: http://localhost:9000
              endpoint: /mcp/message
    openai:
      api-key: "lm-studio"
      base-url: http://localhost:1234
      chat:
        options:
          model: qwen2.5-14b-instruct

# Server – Bind-Adresse und Session-Cookie-Flags
server:
  address: 127.0.0.1
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict

# Actuator – separater Port, nur auf localhost erreichbar (SWARCHITEKTUR.md §7)
management:
  server:
    port: 8090
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Logging – Produktion (SWARCHITEKTUR.md §7)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    de.mirkosertic.powerstaff: INFO
    org.springframework: WARN
    root: WARN
