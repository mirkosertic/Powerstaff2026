spring:
  application:
    name: powerstaff
  main:
    allow-bean-definition-overriding: true

  # Flyway – Schema-Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Automatische Schema-Generierung ist explizit deaktiviert (ADR-008)
  sql:
    init:
      mode: never

  # Zeichenkodierung – UTF-8 für alle HTTP-Responses erzwingen
  mandatory-file-encoding: UTF-8

  # Thymeleaf
  thymeleaf:
    cache: true
    encoding: UTF-8

  ai:
    openai:
      api-key: "invalid"

# Server – Bind-Adresse und Session-Cookie-Flags
server:
  address: 127.0.0.1
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict

# Actuator – separater Port, nur auf localhost erreichbar (SWARCHITEKTUR.md §7)
management:
  server:
    port: 8090
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Logging – Produktion (SWARCHITEKTUR.md §7)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    de.mirkosertic.powerstaff: INFO
    org.springframework: WARN
    root: WARN
