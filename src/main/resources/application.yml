spring:
  application:
    name: powerstaff
  main:
    allow-bean-definition-overriding: true

  # Flyway – Schema-Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Automatische Schema-Generierung ist explizit deaktiviert (ADR-008)
  sql:
    init:
      mode: never

  # Zeichenkodierung – UTF-8 für alle HTTP-Responses erzwingen
  mandatory-file-encoding: UTF-8

  # Thymeleaf
  thymeleaf:
    cache: true
    encoding: UTF-8

  ai:
    openai:
      api-key: "invalid"

    model:
      embedding: "undefined"
      chat: "undefined"

    # MCP Client Auto-Konfiguration deaktiviert – manuelles Factory-Pattern
    mcp:
      client:
        enabled: false

  web:
    error:
      include-exception: true
      include-message: always
      include-stacktrace: always

# MCP (Model Context Protocol) – Produktion: deaktiviert
powerstaff:
  mcp:
    enabled: false
  profilesearch:
    streaming-timeout: 5m

# Server – Bind-Adresse und Session-Cookie-Flags
server:
  address: 127.0.0.1
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict

# Actuator – separater Port, nur auf localhost erreichbar (SWARCHITEKTUR.md §7)
management:
  server:
    port: 8090
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Logging – Produktion (SWARCHITEKTUR.md §7)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    de.mirkosertic.powerstaff: INFO
    org.springframework: WARN
    # Stream-Abbrüche (SSE-Timeout, Browser-Disconnect) werden im Controller behandelt;
    # der MessageAggregator würde denselben Fehler doppelt als ERROR loggen.
    org.springframework.ai.chat.model.MessageAggregator: OFF
    root: WARN
