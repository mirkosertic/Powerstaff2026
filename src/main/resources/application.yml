spring:
  application:
    name: powerstaff

  # Flyway – Schema-Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Automatische Schema-Generierung ist explizit deaktiviert (ADR-008)
  sql:
    init:
      mode: never

  # Thymeleaf
  thymeleaf:
    cache: true
    encoding: UTF-8

  # Security – Session Cookie Flags
  session:
    cookie:
      http-only: true
      secure: true
      same-site: strict

# Actuator – nur auf localhost erreichbar (SWARCHITEKTUR.md §7)
management:
  server:
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Logging – Produktion (SWARCHITEKTUR.md §7)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    de.mirkosertic.powerstaff: INFO
    org.springframework: WARN
    root: WARN
