<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: Tabellenzeilen für Kunden-Suche (Infinite Scroll).
  Wird via GET /kunde/search-more eingebunden und liefert nur <tr>-Zeilen.
-->
<div th:fragment="results" th:remove="tag">
  <tr th:each="r : ${results}"
      th:classappend="${r.contactForbidden()} ? ' row-forbidden' : ''"
      th:attr="data-testid='kunde-row-' + ${r.id()}, data-nav='/kunde/' + ${r.id()}">
    <td class="td-name">
      <a class="row-link" th:href="@{/kunde/{id}(id=${r.id()})}" th:text="${r.company()}"></a>
    </td>
    <td th:text="${r.name1()}"></td>
    <td th:text="${r.name2()}"></td>
    <td th:text="${r.city()}"></td>
  </tr>
</div>

</body>
</html>
