<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: Tabellenzeilen für Kunden-Suche (Infinite Scroll).
  Wird via GET /kunde/search-more eingebunden und liefert nur <tr>-Zeilen.
-->
<div th:fragment="results" th:remove="tag">
  <tr th:each="r : ${results}"
      th:attr="data-testid='kunde-row-' + ${r.id()}"
      th:onclick="|window.location='/kunde/${r.id()}'|"
      style="cursor:pointer">
    <td class="td-name" th:text="${r.company()}"></td>
    <td th:text="${r.name1()}"></td>
    <td th:text="${r.name2()}"></td>
    <td th:text="${r.city()}"></td>
  </tr>
</div>

</body>
</html>
