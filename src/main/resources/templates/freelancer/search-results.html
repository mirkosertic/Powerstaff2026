<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: Tabellenzeilen für Freiberufler-Suche (Infinite Scroll).
  Wird via GET /freelancer/search-more eingebunden und liefert nur <tr>-Zeilen.
-->
<div th:fragment="results" th:remove="tag">
  <tr th:each="r : ${results}"
      th:classappend="${r.contactForbidden()} ? ' row-forbidden' : ''"
      th:attr="data-testid='freelancer-row-' + ${r.id()}, data-fl-id=${r.id()}, data-return-to=${returnTo}">
    <td class="td-name">
      <a class="row-link"
         th:href="${returnTo != null} ? @{/freelancer/{id}(id=${r.id()},returnTo=${returnTo})} : @{/freelancer/{id}(id=${r.id()})}"
         th:text="${r.name1()}"></a>
    </td>
    <td th:text="${r.name2()}"></td>
    <td th:text="${r.company()}"></td>
    <td th:text="${r.city()}"></td>
    <td th:text="${r.availabilityAsDate() != null} ? ${#temporals.format(r.availabilityAsDate(), 'dd.MM.yyyy')} : ''"></td>
    <td th:text="${r.salaryPerDayLong() != null} ? ${r.salaryPerDayLong()} + ' €' : ''"></td>
    <td th:text="${r.code()}"></td>
    <td>
      <span th:each="tag : ${r.tags()}"
            class="chip chip-xs"
            th:text="${tag.tagname()}"
            th:attr="data-testid='search-tag-' + ${tag.id()}, data-tag-id=${tag.id()}"
            onclick="navigateToTagSearch(event, this)">
      </span>
    </td>
  </tr>
</div>

</body>
</html>
