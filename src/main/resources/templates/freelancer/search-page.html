<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Freiberufler', 'freelancer', ~{::body})}">
<body>

  <div th:replace="~{fragments/toolbar :: toolbar(
      'Freiberufler',
      null, null, null, null, null, null,
      null, null,
      null,
      null,
      null,
      null,
      null)}">
  </div>

  <div id="page">

    <div class="btn-row mb-md">
      <a class="btn-ghost" th:href="${editSearchUrl}">&#8592; Suche bearbeiten</a>
      <span class="text-muted" th:text="${totalCount} + ' Treffer'"></span>
    </div>

    <p th:if="${#lists.isEmpty(results)}" class="text-muted">Keine Treffer gefunden.</p>

    <div class="tbl-wrap" th:if="${!#lists.isEmpty(results)}">
      <table>
        <thead>
          <tr>
            <th class="srt"
                th:classappend="${sortField == 'name1'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='name1',
                  sortDir=${sortField == 'name1' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Name 1</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'name2'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='name2',
                  sortDir=${sortField == 'name2' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Name 2</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'company'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='company',
                  sortDir=${sortField == 'company' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Firma</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'city'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='city',
                  sortDir=${sortField == 'city' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Ort</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'availability_as_date'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='availability_as_date',
                  sortDir=${sortField == 'availability_as_date' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Verfügbar ab</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'salary_per_day_long'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='salary_per_day_long',
                  sortDir=${sortField == 'salary_per_day_long' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Tagessatz</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'code'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/freelancer/search(
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  company=${criteria.company()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  nationalitaet=${criteria.nationalitaet()},
                  comments=${criteria.comments()},
                  einsatzdetails=${criteria.einsatzdetails()},
                  contactPerson=${criteria.contactPerson()},
                  contactReason=${criteria.contactReason()},
                  kontaktart=${criteria.kontaktart()},
                  debitorNr=${criteria.debitorNr()},
                  gulpId=${criteria.gulpId()},
                  code=${criteria.code()},
                  skills=${criteria.skills()},
                  salaryLongMax=${criteria.salaryLongMax()},
                  salaryPerDayLongMax=${criteria.salaryPerDayLongMax()},
                  sortField='code',
                  sortDir=${sortField == 'code' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Code</a>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${results}"
              th:attr="data-testid='freelancer-row-' + ${r.id()}"
              th:onclick="|window.location='/freelancer/${r.id()}'|"
              style="cursor:pointer">
            <td class="td-name" th:text="${r.name1()}"></td>
            <td th:text="${r.name2()}"></td>
            <td th:text="${r.company()}"></td>
            <td th:text="${r.city()}"></td>
            <td th:text="${r.availabilityAsDate() != null} ? ${#temporals.format(r.availabilityAsDate(), 'dd.MM.yyyy')} : ''"></td>
            <td th:text="${r.salaryPerDayLong() != null} ? ${r.salaryPerDayLong()} + ' €' : ''"></td>
            <td th:text="${r.code()}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <ps-infinite-scroll
        th:if="${nextUrl != null}"
        th:attr="data-next-url=${nextUrl}"
        data-target=".tbl-wrap table tbody">
    </ps-infinite-scroll>

  </div>

</body>
</html>
