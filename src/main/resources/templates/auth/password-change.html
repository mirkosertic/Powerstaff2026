<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Powerstaff 2026 – Passwort ändern</title>
  <style>
    body { font-family: sans-serif; background: #eaecf0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .change-box { background: #f9fafb; border: 1px solid #c8cdd6; border-radius: 8px; padding: 2rem; width: 360px; }
    h1 { font-size: 1.25rem; color: #1c2333; margin-bottom: 0.5rem; }
    p.subtitle { font-size: 0.875rem; color: #4a5568; margin-bottom: 1.5rem; }
    .fg { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem; }
    label { font-size: 0.875rem; color: #4a5568; }
    input { padding: 0.5rem; border: 1px solid #c8cdd6; border-radius: 4px; font-size: 0.9rem; }
    .btn { width: 100%; padding: 0.6rem; background: #2d5be3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; margin-top: 0.5rem; }
    .error { color: #c53030; font-size: 0.875rem; margin-bottom: 1rem; padding: 0.5rem; background: #fff5f5; border: 1px solid #fed7d7; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="change-box">
    <h1>Passwort ändern</h1>
    <p class="subtitle">Bitte vergeben Sie ein neues Passwort (mindestens 8 Zeichen).</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" th:action="@{/passwort-aendern}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="fg">
        <label for="oldPassword">Aktuelles Passwort</label>
        <input type="password" id="oldPassword" name="oldPassword" required autofocus>
      </div>

      <div class="fg">
        <label for="newPassword">Neues Passwort</label>
        <input type="password" id="newPassword" name="newPassword" required minlength="8">
      </div>

      <div class="fg">
        <label for="newPasswordConfirm">Neues Passwort bestätigen</label>
        <input type="password" id="newPasswordConfirm" name="newPasswordConfirm" required minlength="8">
      </div>

      <button type="submit" class="btn">Passwort speichern</button>
    </form>
  </div>
</body>
</html>
