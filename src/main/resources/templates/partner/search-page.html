<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Partner', 'partner', ~{::body})}">
<body>

  <div th:replace="~{fragments/toolbar :: toolbar(
      'Partner',
      null, null, null, null, null, null,
      null, null,
      null,
      null,
      null,
      null,
      null)}">
  </div>

  <div id="page">

    <div class="btn-row mb-md">
      <a class="btn-ghost" th:href="${editSearchUrl}">&#8592; Suche bearbeiten</a>
      <span class="text-muted" th:text="${totalCount} + ' Treffer'"></span>
    </div>

    <p th:if="${#lists.isEmpty(results)}" class="text-muted">Keine Treffer gefunden.</p>

    <div class="tbl-wrap" th:if="${!#lists.isEmpty(results)}">
      <table>
        <thead>
          <tr>
            <th class="srt"
                th:classappend="${sortField == 'company'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/partner/search(
                  company=${criteria.company()},
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  comments=${criteria.comments()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='company',
                  sortDir=${sortField == 'company' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Firma</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'name1'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/partner/search(
                  company=${criteria.company()},
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  comments=${criteria.comments()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='name1',
                  sortDir=${sortField == 'name1' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Name 1</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'name2'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/partner/search(
                  company=${criteria.company()},
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  comments=${criteria.comments()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='name2',
                  sortDir=${sortField == 'name2' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Name 2</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'city'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/partner/search(
                  company=${criteria.company()},
                  name1=${criteria.name1()},
                  name2=${criteria.name2()},
                  street=${criteria.street()},
                  country=${criteria.country()},
                  plz=${criteria.plz()},
                  city=${criteria.city()},
                  comments=${criteria.comments()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='city',
                  sortDir=${sortField == 'city' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Ort</a>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${results}"
              th:classappend="${r.contactForbidden()} ? ' row-forbidden' : ''"
              th:attr="data-testid='partner-row-' + ${r.id()}, data-nav='/partner/' + ${r.id()}">
            <td class="td-name">
              <a class="row-link" th:href="@{/partner/{id}(id=${r.id()})}" th:text="${r.company()}"></a>
            </td>
            <td th:text="${r.name1()}"></td>
            <td th:text="${r.name2()}"></td>
            <td th:text="${r.city()}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <ps-infinite-scroll
        th:if="${nextUrl != null}"
        th:attr="data-next-url=${nextUrl}"
        data-target=".tbl-wrap table tbody">
    </ps-infinite-scroll>

  </div>

<script>
  document.addEventListener('click', function(e) {
    const row = e.target.closest('tr[data-nav]');
    if (!row || e.target.closest('a, button')) return;
    const url = row.dataset.nav;
    if (e.ctrlKey || e.metaKey || e.shiftKey) window.open(url, '_blank');
    else location.href = url;
  });
  document.addEventListener('mousedown', function(e) {
    if (e.button !== 1) return;
    const row = e.target.closest('tr[data-nav]');
    if (!row || e.target.closest('a')) return;
    e.preventDefault();
    window.open(row.dataset.nav, '_blank');
  });
</script>

</body>
</html>
