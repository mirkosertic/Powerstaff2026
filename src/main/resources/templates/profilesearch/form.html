<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Profilsuche', 'profilesearch', ~{::body})}">
<body>

  <!-- Chat-Toolbar (§27 Toolbar-Variante Profilsuche) -->
  <div id="toolbar">
    <div id="tb-module">Profilsuche</div>

    <!-- Sidebar-Toggle (nur auf kleinen Screens sichtbar, §24) -->
    <button class="sidebar-toggle-mobile btn btn-ghost btn-sm"
            onclick="openSidebar()" title="Chat-Verlauf">☰</button>

    <!-- Gemerktes Projekt -->
    <div id="tb-project" th:if="${rememberedProject != null}">
      📌 <strong th:text="${rememberedProject.projectNumber}"></strong>
      – <span th:text="${rememberedProject.shortDescription}"></span>
    </div>

    <!-- Aktionen -->
    <div id="tb-actions">
      <form th:action="@{/profilesearch/chat/new}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-ghost">＋ Neuer Chat</button>
      </form>

      <button type="button" class="btn btn-danger"
              th:attr="data-chat-id=${chatId}"
              onclick="openModal('modal-delete')">
        🗑 Chat löschen
      </button>
    </div>
  </div>

  <!-- Split-Panel (§24) -->
  <div id="chat-page">

    <!-- Sidebar (§25) -->
    <aside id="chat-sidebar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Verlauf ein-/ausblenden">☰</button>

      <p class="sidebar-label">Chat-Verlauf</p>

      <div class="chat-session-list" id="sidebar-session-list">
        <th:block th:each="chat : ${sidebar}">
          <div class="chat-session-item"
               th:classappend="${chat.id() == chatId} ? ' active' : ''"
               th:onclick="${chat.id() == chatId} ? '' : 'location.href=\'/profilesearch/chat/' + ${chat.id()} + '\''">
            <div class="session-info">
              <div class="session-title"
                   th:text="${chat.title() != null and !chat.title().isEmpty()} ? ${chat.title()} : 'Neuer Chat'">
              </div>
              <div class="session-project" th:if="${chat.projectNumber() != null}">
                📁 <span th:text="${chat.projectNumber()}"></span>
              </div>
              <div class="session-meta"
                   th:text="${#temporals.format(chat.changedDate(), 'dd.MM.yyyy HH:mm')}">
              </div>
            </div>
            <button class="ibtn del" title="Chat löschen"
                    th:attr="data-chat-id=${chat.id()}"
                    onclick="confirmDeleteChat(event, this.dataset.chatId)">🗑</button>
          </div>
        </th:block>

        <!-- Infinite Scroll Sentinel (§25) -->
        <ps-infinite-scroll
            th:if="${totalChats > pageSize}"
            th:attr="data-next-url='/profilesearch/sidebar-more?offset=' + ${pageSize},data-target='#sidebar-session-list'">
        </ps-infinite-scroll>
      </div>
    </aside>

    <!-- Chat-Hauptbereich -->
    <div id="chat-main">

      <!-- Nachrichten (§26) -->
      <div id="chat-messages">

        <!-- Leerer Zustand -->
        <div class="empty-chat" th:if="${#lists.isEmpty(messages)}">
          Stellen Sie Ihre erste Frage zur Profilsuche.
        </div>

        <!-- Nachrichten-Liste -->
        <th:block th:each="msg : ${messages}">
          <div class="chat-msg"
               th:classappend="${msg.role()} == 'user' ? ' user' : ' assistant'"
               th:attr="data-msg-id=${msg.id()}">
            <div class="msg-bubble"
                 th:utext="${msg.role() == 'assistant'}
                           ? ${#strings.replace(#strings.replace(#strings.replace(#strings.escapeXml(msg.content()), '&#xA;', '<br/>'), '&lt;', '<'), '&gt;', '>')}
                           : ${#strings.escapeXml(msg.content())}">
            </div>
            <div class="msg-meta"
                 th:text="${#temporals.format(msg.creationDate(), 'HH:mm')}">
            </div>
          </div>
        </th:block>
      </div>

      <!-- Eingabebereich (§27) -->
      <div id="chat-input-area">
        <ps-chat-input id="ps-chat-input-el">
          <textarea id="chat-input" rows="3"
                    placeholder="Nachricht eingeben… (Enter = Senden, Shift+Enter = Zeilenumbruch)"></textarea>
          <div class="chat-input-btns">
            <button type="button" id="chat-stop" class="btn btn-ghost btn-sm" hidden>⏹ Stop</button>
            <button type="button" id="chat-send" class="btn btn-pri btn-sm">↑ Senden</button>
          </div>
        </ps-chat-input>
      </div>
    </div>

  </div><!-- /#chat-page -->

  <!-- Sidebar-Backdrop (mobile) -->
  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- Modal: Chat löschen -->
  <div class="mbk hidden" id="modal-delete">
    <div class="mbox">
      <div class="mhd">
        <h3>Chat löschen</h3>
        <button type="button" class="mx" onclick="closeModal('modal-delete')">✕</button>
      </div>
      <div class="mbody">
        <p>Soll dieser Chat wirklich gelöscht werden?</p>
      </div>
      <div class="mft">
        <button type="button" class="btn btn-ghost"
                onclick="closeModal('modal-delete')">Abbrechen</button>
        <button type="button" class="btn btn-danger"
                id="btn-confirm-delete">Löschen</button>
      </div>
    </div>
  </div>

  <!-- Inline JS -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    const CHAT_ID = /*[[${chatId}]]*/ null;

    // ── Sidebar toggle ──────────────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('chat-sidebar').classList.toggle('collapsed');
    }
    function openSidebar() {
      document.getElementById('chat-sidebar').classList.add('open');
      document.getElementById('sidebar-backdrop').classList.add('visible');
    }
    function closeSidebar() {
      document.getElementById('chat-sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('visible');
    }

    // ── Chat-Löschen ─────────────────────────────────────────────────────────
    function confirmDeleteChat(event, chatId) {
      event.stopPropagation();
      document.getElementById('btn-confirm-delete').dataset.targetChatId = chatId;
      openModal('modal-delete');
    }

    document.getElementById('btn-confirm-delete').addEventListener('click', function() {
      const targetId = this.dataset.targetChatId || CHAT_ID;
      fetch('/profilesearch/chat/' + targetId + '?_csrf=' + getCsrfToken(), { method: 'DELETE' })
        .then(resp => {
          closeModal('modal-delete');
          if (resp.redirected) { location.href = resp.url; }
          else { location.reload(); }
        });
    });

    // ── Nachrichten senden ───────────────────────────────────────────────────
    const msgArea = document.getElementById('chat-messages');
    const inputEl = document.getElementById('ps-chat-input-el');

    function scrollToBottom() {
      msgArea.scrollTop = msgArea.scrollHeight;
    }
    scrollToBottom();

    function renderAssistantContent(text) {
      // Convert [freelancer:<id>:<label>] to links
      text = text.replace(/\[freelancer:(\d+):([^\]]+)\]/g,
        (_, id, label) => `<a href="/freelancer/${id}" target="_blank">${label}</a>`);
      // Escape everything else that wasn't already converted (simple <pre> fallback)
      return text;
    }

    function appendMsg(role, content, id) {
      const wrapper = document.createElement('div');
      wrapper.className = 'chat-msg ' + role;
      if (id) wrapper.dataset.msgId = id;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'assistant') {
        bubble.innerHTML = renderAssistantContent(content);
      } else {
        bubble.textContent = content;
      }
      wrapper.appendChild(bubble);

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      wrapper.appendChild(meta);

      // Remove empty-chat placeholder if present
      const empty = msgArea.querySelector('.empty-chat');
      if (empty) empty.remove();

      msgArea.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    let currentAbortCtrl = null;

    if (inputEl) {
      inputEl.addEventListener('ps-send', function(e) {
        const text = e.detail.text;
        if (!text) return;

        // Show user message immediately
        appendMsg('user', text, null);

        // Show typing indicator
        const typingEl = appendMsg('assistant', '', null);
        typingEl.classList.add('chat-typing');
        typingEl.querySelector('.msg-bubble').innerHTML =
          '<div class="typing-dots"><span></span><span></span><span></span></div>';

        // Disable input, show stop button
        currentAbortCtrl = new AbortController();
        inputEl.setAttribute('pending', '');

        fetch('/profilesearch/chat/' + CHAT_ID + '/send?_csrf=' + getCsrfToken(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
          signal: currentAbortCtrl.signal
        })
        .then(r => r.json())
        .then(data => {
          typingEl.remove();
          appendMsg('assistant', data.content, data.id);
        })
        .catch((err) => {
          typingEl.remove();
          if (err && err.name !== 'AbortError') {
            appendMsg('assistant', 'Fehler beim Senden. Bitte erneut versuchen.', null);
          }
        })
        .finally(() => {
          currentAbortCtrl = null;
          inputEl.removeAttribute('pending');
        });
      });

      inputEl.addEventListener('ps-stop', function() {
        if (currentAbortCtrl) {
          currentAbortCtrl.abort();
          currentAbortCtrl = null;
        }
        inputEl.removeAttribute('pending');
      });
    }

    // bfcache handler
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        inputEl && inputEl.removeAttribute('pending');
      }
    });
    /*]]>*/
  </script>

</body>
</html>
