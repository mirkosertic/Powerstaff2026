<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!--
    HTMX/Infinite-Scroll Fragment: Sidebar-Einträge
    Wird von GET /profilesearch/sidebar-more zurückgegeben.
    Enthält eine Liste von .chat-session-item Elementen.
  -->
  <th:block th:each="chat : ${sidebar}">
    <div class="chat-session-item"
         th:onclick="'location.href=\'/profilesearch/chat/' + ${chat.id()} + '\''">
      <div class="session-info">
        <div class="session-title"
             th:text="${chat.title() != null and !chat.title().isEmpty()} ? ${chat.title()} : 'Neuer Chat'">
        </div>
        <div class="session-project" th:if="${chat.projectNumber() != null}">
          📁 <span th:text="${chat.projectNumber()}"></span>
        </div>
        <div class="session-meta"
             th:text="${#temporals.format(chat.changedDate(), 'dd.MM.yyyy HH:mm')}">
        </div>
      </div>
      <button class="ibtn del" title="Chat löschen"
              th:attr="data-chat-id=${chat.id()}"
              onclick="confirmDeleteChat(event, this.dataset.chatId)">🗑</button>
    </div>
  </th:block>
</body>
</html>
