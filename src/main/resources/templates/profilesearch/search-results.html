<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="results">
  <th:block th:each="r : ${results}">
    <tr th:classappend="${r.id() == null} ? ' row-unresolved' : (${r.contactForbidden()} ? ' row-forbidden' : '')"
        th:attr="data-testid=(${r.id() != null} ? 'result-row-' + ${r.id()} : null), data-fl-id=${r.id()}">
      <td>
        <a th:if="${r.id() != null}"
           class="row-link"
           th:href="${returnTo != null} ? @{/freelancer/{id}(id=${r.id()},returnTo=${returnTo})} : @{/freelancer/{id}(id=${r.id()})}"
           th:text="${r.name1()}"></a>
        <span th:if="${r.id() == null}" th:text="${r.name1()}"></span>
      </td>
      <td th:text="${r.name2()}"></td>
      <td th:text="${r.lastContactDate() != null} ? ${#temporals.format(r.lastContactDate(), 'dd.MM.yyyy')} : ''"></td>
      <td th:text="${r.salaryPerDayLong() != null} ? ${r.salaryPerDayLong()} + ' €' : ''"></td>
      <td th:text="${r.availabilityAsDate() != null} ? ${#temporals.format(r.availabilityAsDate(), 'dd.MM.yyyy')} : ''"></td>
      <td>
        <span th:text="${r.code()}"></span>
        <span th:if="${r.id() == null}" title="Kein Freiberufler in der Datenbank gefunden">&#x26A0;&#xFE0F;</span>
      </td>
      <td>
        <span th:each="tag : ${r.tags()}"
              class="chip chip-xs"
              th:text="${tag.tagname()}"
              th:attr="data-testid='result-tag-' + ${tag.id()}"
              th:onclick="'event.stopPropagation(); psNavigateToFreelancerSearch(\'?tagId=' + ${tag.id()} + '\')'">
        </span>
      </td>
    </tr>
    <tr th:if="${r.serp() != null}"
        class="serp-row"
        th:classappend="${r.id() == null} ? ' row-unresolved' : (${r.contactForbidden()} ? ' row-forbidden' : '')"
        th:attr="data-fl-id=${r.id()}"
        th:onclick="${r.id() != null} ? 'psNavigateToFreelancer(' + ${r.id()} + ', event)' : null">
      <td colspan="7">
        <div th:if="${r.serpIsMarkdown()}" class="serp-text" th:attr="data-markdown=${r.serp()}"></div>
        <div th:unless="${r.serpIsMarkdown()}" class="serp-text" th:text="${r.serp()}"></div>
        <div th:if="${r.score() != null}" class="score-bar-wrap"
             th:attr="data-score=${r.score()}">
          <div class="score-bar"></div>
        </div>
      </td>
    </tr>
  </th:block>
</th:block>
