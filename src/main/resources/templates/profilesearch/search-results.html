<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="results">
  <tr th:each="r : ${results}"
      th:classappend="${r.contactForbidden()} ? ' row-forbidden' : ''"
      th:attr="data-testid='result-row-' + ${r.id()}"
      th:onclick="'location.href=\'/freelancer/' + ${r.id()} + '?returnTo=profilesearch-search\''">
    <td th:text="${r.name1()}"></td>
    <td th:text="${r.name2()}"></td>
    <td th:text="${r.lastContactDate() != null} ? ${#temporals.format(r.lastContactDate(), 'dd.MM.yyyy')} : ''"></td>
    <td th:text="${r.salaryPerDayLong() != null} ? ${r.salaryPerDayLong()} + ' €' : ''"></td>
    <td th:text="${r.availabilityAsDate() != null} ? ${#temporals.format(r.availabilityAsDate(), 'dd.MM.yyyy')} : ''"></td>
    <td th:text="${r.code()}"></td>
    <td>
      <span th:each="tag : ${r.tags()}"
            class="chip chip-xs"
            th:text="${tag.tagname()}"
            th:attr="data-testid='result-tag-' + ${tag.id()}"
            th:onclick="'event.stopPropagation(); location.href=\'/freelancer/search?tagId=' + ${tag.id()} + '&amp;returnTo=profilesearch-search\''">
      </span>
    </td>
  </tr>
</th:block>
