<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Historientypen', 'admin', ~{::body})}">
<body>

  <!-- Toolbar -->
  <div th:replace="~{fragments/toolbar :: toolbar(
      'ADMINISTRATION',
      null, null, null, null, null,
      null, null, null, null)}">
  </div>

  <!-- Page Content -->
  <div id="page">

    <div class="fcard">
      <h2>Historientypen</h2>

      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Bezeichnung</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="type : ${types}">
            <td th:text="${type.id}"></td>
            <td th:text="${type.description}"></td>
            <td>
              <button class="ibtn" type="button"
                      th:attr="data-id=${type.id}, data-description=${type.description}"
                      data-action="edit-ht">&#9998;</button>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(types)}">
            <td colspan="3" style="text-align:center">Keine Einträge vorhanden.</td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top:1rem">
        <button class="btn btn-add" type="button"
                onclick="document.getElementById('modal-new-ht').classList.remove('hidden')">
          &#xFF0B; Neuer Historientyp
        </button>
      </div>
    </div>

  </div>

  <!-- Modal: Neuanlage -->
  <div class="mbk hidden" id="modal-new-ht">
    <div class="mbox">
      <div class="mhd">
        <h3>Neuen Historientyp anlegen</h3>
        <button class="mx" type="button" onclick="closeModal('modal-new-ht')">&#x2715;</button>
      </div>
      <div class="mbody">
        <form id="new-ht-form" method="post" th:action="@{/admin/historientypen}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb">
            <label for="new-ht-description">Bezeichnung</label>
            <input type="text" id="new-ht-description" name="description"
                   required maxlength="255" autocomplete="off">
          </div>
        </form>
      </div>
      <div class="mft">
        <button class="btn btn-ghost" type="button" onclick="closeModal('modal-new-ht')">Abbrechen</button>
        <button class="btn btn-pri" type="submit" form="new-ht-form">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Modal: Bearbeiten -->
  <div class="mbk hidden" id="modal-edit-ht">
    <div class="mbox">
      <div class="mhd">
        <h3>Historientyp bearbeiten</h3>
        <button class="mx" type="button" onclick="closeModal('modal-edit-ht')">&#x2715;</button>
      </div>
      <div class="mbody">
        <form id="edit-ht-form" method="post" action="#">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb">
            <label for="edit-ht-description">Bezeichnung</label>
            <input type="text" id="edit-ht-description" name="description"
                   required maxlength="255" autocomplete="off">
          </div>
        </form>
      </div>
      <div class="mft">
        <button class="btn btn-ghost" type="button" onclick="closeModal('modal-edit-ht')">Abbrechen</button>
        <button class="btn btn-pri" type="submit" form="edit-ht-form">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-action="edit-ht"]');
      if (!btn) return;
      document.getElementById('edit-ht-form').action = '/admin/historientypen/' + btn.dataset.id;
      document.getElementById('edit-ht-description').value = btn.dataset.description;
      document.getElementById('modal-edit-ht').classList.remove('hidden');
    });

    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }
  </script>

</body>
</html>
