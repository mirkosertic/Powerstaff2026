<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Tags', 'admin', ~{::body})}">
<body>

  <!-- Toolbar -->
  <div th:replace="~{fragments/toolbar :: toolbar(
      'ADMINISTRATION',
      null, null, null, null, null,
      null, null, null, null,
      'Administration', null, null, null)}">
  </div>

  <!-- Page Content -->
  <div id="page">

    <!-- Admin-Navigation -->
    <div class="btn-row mb-md">
      <a class="btn btn-ghost" th:href="@{/admin/historientypen}">Historientypen</a>
      <a class="btn btn-ghost" th:href="@{/admin/positionsstatus}">Positionsstatus</a>
      <a class="btn btn-pri" th:href="@{/admin/tags}">Tags</a>
      <a class="btn btn-ghost" th:href="@{/admin/benutzer}">Benutzer</a>
    </div>

    <!-- Neuanlage -->
    <div class="fcard">
      <div class="fcard-hd">
        <span class="fcard-title">Neuen Tag anlegen</span>
      </div>
      <div class="fcard-body">
        <form method="post" th:action="@{/admin/tags}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="fg2 mb">
            <div class="fg">
              <label for="new-tag-type">Tag-Typ</label>
              <select id="new-tag-type" name="tagType" required>
                <option value="">– Typ wählen –</option>
                <option th:each="tt : ${tagTypes}"
                        th:value="${tt.name()}"
                        th:text="${tt.label}"></option>
              </select>
            </div>
            <div class="fg">
              <label for="new-tag-name">Name</label>
              <input type="text" id="new-tag-name" name="tagname"
                     required maxlength="255" autocomplete="off">
            </div>
          </div>
          <button class="btn btn-pri" type="submit" data-testid="btn-submit-tag">＋ Tag anlegen</button>
        </form>
      </div>
    </div>

    <!-- Eine Karte pro TagType -->
    <div th:each="entry : ${tagsByType}" class="fcard col-wide">
      <div class="fcard-hd">
        <span class="fcard-title" th:text="${entry.key.label}">Tag-Typ</span>
      </div>
      <div class="fcard-body">
        <div class="tbl-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="tag : ${entry.value}" th:id="'tag-row-' + ${tag.id}" th:attr="data-testid='tag-row-' + ${tag.id}">
                <td th:text="${tag.tagname}"></td>
                <td>
                  <button class="ibtn" type="button"
                          th:attr="data-id=${tag.id}, data-tagname=${tag.tagname}"
                          data-action="edit-tag">&#9998;</button>
                  <button class="ibtn del" type="button"
                          th:attr="data-id=${tag.id}"
                          data-action="delete-tag">&#x1F5D1;</button>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(entry.value)}">
                <td colspan="2" class="td-empty">Keine Tags vorhanden.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <!-- Modal: Tag bearbeiten -->
  <div class="mbk hidden" id="modal-edit-tag">
    <div class="mbox">
      <div class="mhd">
        <h3>Tag bearbeiten</h3>
        <button class="mx" type="button" onclick="closeModal('modal-edit-tag')">&#x2715;</button>
      </div>
      <div class="mbody">
        <form id="edit-tag-form" method="post" action="#">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb">
            <label for="edit-tag-name">Name</label>
            <input type="text" id="edit-tag-name" name="tagname"
                   required maxlength="255" autocomplete="off">
          </div>
        </form>
      </div>
      <div class="mft">
        <button class="btn btn-ghost" type="button" onclick="closeModal('modal-edit-tag')">Abbrechen</button>
        <button class="btn btn-pri" type="submit" form="edit-tag-form">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('click', function(e) {
      const editBtn = e.target.closest('[data-action="edit-tag"]');
      if (editBtn) {
        document.getElementById('edit-tag-form').action = '/admin/tags/' + editBtn.dataset.id;
        document.getElementById('edit-tag-name').value = editBtn.dataset.tagname;
        openModal('modal-edit-tag');
        return;
      }

      const delBtn = e.target.closest('[data-action="delete-tag"]');
      if (delBtn) {
        deleteTag(delBtn.dataset.id, delBtn);
      }
    });

    async function deleteTag(id, el) {
      if (!confirm('Tag wirklich löschen?')) return;
      const resp = await fetch('/admin/tags/' + id, {
        method: 'DELETE',
        headers: { 'X-XSRF-TOKEN': getCsrfToken() }
      });
      if (resp.ok) {
        const row = el.closest('tr');
        if (row) row.remove();
      }
    }
  </script>

</body>
</html>
