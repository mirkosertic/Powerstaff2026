<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Projekte', 'project', ~{::body})}">
<body>

  <div th:replace="~{fragments/toolbar :: toolbar(
      'Projekte',
      null, null, null, null, null, null,
      null, null,
      null,
      null,
      null,
      null,
      null)}">
  </div>

  <div id="page">

    <div class="btn-row mb-md">
      <a class="btn-ghost" th:href="${editSearchUrl}">&#8592; Suche bearbeiten</a>
      <span class="text-muted" th:text="${totalCount} + ' Treffer'"></span>
    </div>

    <p th:if="${#lists.isEmpty(results)}" class="text-muted">Keine Treffer gefunden.</p>

    <div class="tbl-wrap" th:if="${!#lists.isEmpty(results)}">
      <table data-testid="results-table">
        <thead>
          <tr>
            <th class="srt"
                th:classappend="${sortField == 'project_number'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/project/search(
                  projectNumber=${criteria.projectNumber()},
                  descriptionShort=${criteria.descriptionShort()},
                  descriptionLong=${criteria.descriptionLong()},
                  skills=${criteria.skills()},
                  workplace=${criteria.workplace()},
                  duration=${criteria.duration()},
                  status=${criteria.status()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='project_number',
                  sortDir=${sortField == 'project_number' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Projektnummer</a>
            </th>
            <th class="srt"
                th:classappend="${sortField == 'description_short'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/project/search(
                  projectNumber=${criteria.projectNumber()},
                  descriptionShort=${criteria.descriptionShort()},
                  descriptionLong=${criteria.descriptionLong()},
                  skills=${criteria.skills()},
                  workplace=${criteria.workplace()},
                  duration=${criteria.duration()},
                  status=${criteria.status()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='description_short',
                  sortDir=${sortField == 'description_short' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Kurzbeschreibung</a>
            </th>
            <th>Einsatzort</th>
            <th>Start</th>
            <th class="srt"
                th:classappend="${sortField == 'status'} ? (${sortDir == 'asc'} ? ' srt-asc' : ' srt-desc') : ''">
              <a th:href="@{/project/search(
                  projectNumber=${criteria.projectNumber()},
                  descriptionShort=${criteria.descriptionShort()},
                  descriptionLong=${criteria.descriptionLong()},
                  skills=${criteria.skills()},
                  workplace=${criteria.workplace()},
                  duration=${criteria.duration()},
                  status=${criteria.status()},
                  debitorNr=${criteria.debitorNr()},
                  kreditorNr=${criteria.kreditorNr()},
                  sortField='status',
                  sortDir=${sortField == 'status' and sortDir == 'asc' ? 'desc' : 'asc'}
              )}">Status</a>
            </th>
            <th>Stundensatz</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${results}"
              th:attr="data-testid='project-row-' + ${r.id()}, data-nav='/project/' + ${r.id()}">
            <td class="td-name">
              <a class="row-link" th:href="@{/project/{id}(id=${r.id()})}" th:text="${r.projectNumber()}"></a>
            </td>
            <td th:text="${r.descriptionShort()}"></td>
            <td th:text="${r.workplace()}"></td>
            <td th:text="${r.startDate() != null} ? ${#temporals.format(r.startDate(), 'dd.MM.yyyy')} : ''"></td>
            <td>
              <span th:switch="${r.status()}">
                <span th:case="1">Offen</span>
                <span th:case="2">Verloren</span>
                <span th:case="3">Canceled</span>
                <span th:case="4">Besetzt</span>
                <span th:case="5">Search zu</span>
                <span th:case="*" th:text="${r.status()}"></span>
              </span>
            </td>
            <td th:text="${r.stundensatzVk() != null} ? ${r.stundensatzVk()} + ' EUR/h' : ''"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <ps-infinite-scroll
        th:if="${nextUrl != null}"
        th:attr="data-next-url=${nextUrl}"
        data-target=".tbl-wrap table tbody">
    </ps-infinite-scroll>

  </div>

<script>
  document.addEventListener('click', function(e) {
    const row = e.target.closest('tr[data-nav]');
    if (!row || e.target.closest('a, button')) return;
    const url = row.dataset.nav;
    if (e.ctrlKey || e.metaKey || e.shiftKey) window.open(url, '_blank');
    else location.href = url;
  });
  document.addEventListener('mousedown', function(e) {
    if (e.button !== 1) return;
    const row = e.target.closest('tr[data-nav]');
    if (!row || e.target.closest('a')) return;
    e.preventDefault();
    window.open(row.dataset.nav, '_blank');
  });
</script>

</body>
</html>
