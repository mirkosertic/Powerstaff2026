<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Form-Toolbar (§6 + §21)

  Parameter:
    moduleLabel          – Bezeichnung des Moduls (z. B. "Freiberufler")
    firstUrl             – URL für den "Erster"-Button
    prevUrl              – URL für den "Vorheriger"-Button
    entityId             – Aktuell angezeigte ID (oder null bei Neuanlage)
    nextUrl              – URL für den "Nächster"-Button
    lastUrl              – URL für den "Letzter"-Button
    newUrl               – URL für den Neu-Button
    saveFormId           – ID des Formulars, das beim Speichern abgeschickt wird
    deleteModalId        – ID des Löschen-Bestätigungs-Modals (ohne #), öffnet openModal(id)
    rememberedProject    – Objekt mit Feldern projectNumber + shortDescription (oder null)
    auditInfo            – Audit-Infotext (z. B. "Erfasst: 01.01.2026 admin · Geändert: ...")
                           oder "Neu, noch nicht gespeichert" bei Neuanlage
    searchPanelId        – wenn gesetzt, wird ein "Suchen"-Button angezeigt, der die QBE-Suche auslöst
    assignProjectLabel   – Beschriftung des "Zuordnen"-Buttons neben dem gemerkten Projekt (oder null)
    clearUrl             – URL für den "Formular leeren"-Button (oder null); nur für Formulare ohne Neu-Button
-->
<div id="toolbar" th:fragment="toolbar(moduleLabel, firstUrl, prevUrl, entityId, nextUrl, lastUrl, newUrl, saveFormId, deleteModalId, rememberedProject, auditInfo, searchPanelId, assignProjectLabel, clearUrl)">
<div id="toolbar-inner">

  <!-- Modul-Label -->
  <div id="tb-module" th:text="${moduleLabel}">Modul</div>

  <!-- Datensatz-Navigation (nur wenn Navigation vorhanden) -->
  <div id="tb-nav" th:if="${firstUrl != null}">
    <a class="tb-nav-btn"
       th:href="${firstUrl}"
       data-testid="btn-nav-first"
       title="Erster">⏮</a>
    <a class="tb-nav-btn"
       th:href="${prevUrl}"
       data-testid="btn-nav-prev"
       title="Vorheriger">◀</a>
    <input type="text"
           id="tb-id-input"
           data-testid="input-nav-id"
           th:value="${entityId}"
           placeholder="ID"
           title="ID eingeben und Enter drücken">
    <a class="tb-nav-btn"
       th:href="${nextUrl}"
       data-testid="btn-nav-next"
       title="Nächster">▶</a>
    <a class="tb-nav-btn"
       th:href="${lastUrl}"
       data-testid="btn-nav-last"
       title="Letzter">⏭</a>
  </div>

  <!-- Audit-Informationen -->
  <div id="tb-audit" th:text="${auditInfo}"></div>

  <!-- Gemerktes Projekt (§21) – nur anzeigen wenn vorhanden -->
  <div id="tb-project" th:if="${rememberedProject != null}">
    📌 <a th:href="@{/project/{id}(id=${rememberedProject.projectId})}"
          onclick="return guardedNavigate(this)">
      <strong th:text="${rememberedProject.projectNumber}">2026-042</strong>
      – <span th:text="${rememberedProject.shortDescription}">Projektbeschreibung</span>
    </a>
  </div>

  <!-- Zuordnen-Button (nur bei Freelancer, wenn Projekt gemerkt) -->
  <button th:if="${assignProjectLabel != null and rememberedProject != null}"
          type="button" class="btn btn-sm btn-ghost" id="tb-assign-btn"
          data-testid="btn-assign-project"
          th:text="${assignProjectLabel}"
          onclick="assignToRememberedProject()"></button>

  <!-- Aktionen -->
  <div id="tb-actions">
    <button type="button" class="btn btn-ghost"
            th:if="${searchPanelId != null}"
            data-testid="btn-search"
            id="btn-qbe-search">🔍 Suchen</button>

    <a class="btn btn-ghost"
       th:if="${clearUrl != null}"
       data-testid="btn-clear"
       th:href="${clearUrl}">↺ Leeren</a>

    <a class="btn btn-ghost"
       th:href="${newUrl}"
       data-testid="btn-new"
       th:if="${newUrl != null}">＋ Neu</a>

    <button type="submit"
            class="btn btn-pri"
            data-testid="btn-save"
            th:attr="form=${saveFormId}"
            th:if="${saveFormId != null}">💾 Speichern</button>

    <button type="button" class="btn btn-danger"
            data-testid="btn-delete"
            th:if="${deleteModalId != null}"
            th:attr="onclick='openModal(\'' + ${deleteModalId} + '\')'">🗑 Löschen</button>
  </div>

</div><!-- /#toolbar-inner -->
</div>

</body>
</html>
