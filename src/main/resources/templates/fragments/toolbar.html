<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Form-Toolbar (§6 + §21)

  Parameter:
    moduleLabel       – Bezeichnung des Moduls (z. B. "Freiberufler")
    firstUrl          – URL für den "Erster"-Button
    prevUrl           – URL für den "Vorheriger"-Button
    entityId          – Aktuell angezeigte ID (oder null bei Neuanlage)
    nextUrl           – URL für den "Nächster"-Button
    lastUrl           – URL für den "Letzter"-Button
    newUrl            – URL für den Neu-Button
    saveFormId        – ID des Formulars, das beim Speichern abgeschickt wird
    deleteUrl         – URL für den Löschen-Button (Modal-Trigger oder direkter Link)
    rememberedProject – Objekt mit Feldern projectNumber + shortDescription (oder null)
-->
<div id="toolbar" th:fragment="toolbar(moduleLabel, firstUrl, prevUrl, entityId, nextUrl, lastUrl, newUrl, saveFormId, deleteUrl, rememberedProject)">

  <!-- Modul-Label -->
  <div id="tb-module" th:text="${moduleLabel}">Modul</div>

  <!-- Datensatz-Navigation -->
  <div id="tb-nav">
    <a class="tb-nav-btn"
       th:href="${firstUrl}"
       title="Erster">⏮</a>
    <a class="tb-nav-btn"
       th:href="${prevUrl}"
       title="Vorheriger">◀</a>
    <input type="text"
           id="tb-id-input"
           th:value="${entityId}"
           placeholder="ID"
           title="ID eingeben und Enter drücken">
    <a class="tb-nav-btn"
       th:href="${nextUrl}"
       title="Nächster">▶</a>
    <a class="tb-nav-btn"
       th:href="${lastUrl}"
       title="Letzter">⏭</a>
  </div>

  <!-- Audit-Informationen (werden vom jeweiligen Controller ins Model gegeben) -->
  <div id="tb-audit">
    <!-- Inhalt wird durch das einbindende Template via th:replace oder direkt befüllt -->
  </div>

  <!-- Gemerktes Projekt (§21) – nur anzeigen wenn vorhanden -->
  <div id="tb-project" th:if="${rememberedProject != null}">
    📌 <strong th:text="${rememberedProject.projectNumber}">2026-042</strong>
    – <span th:text="${rememberedProject.shortDescription}">Projektbeschreibung</span>
  </div>

  <!-- Aktionen -->
  <div id="tb-actions">
    <a class="btn btn-ghost"
       th:href="${newUrl}"
       th:if="${newUrl != null}">＋ Neu</a>

    <button type="submit"
            class="btn btn-pri"
            th:attr="form=${saveFormId}"
            th:if="${saveFormId != null}">💾 Speichern</button>

    <a class="btn btn-danger"
       th:href="${deleteUrl}"
       th:if="${deleteUrl != null}">🗑 Löschen</a>
  </div>

</div>

</body>
</html>
