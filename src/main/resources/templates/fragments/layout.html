<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      th:fragment="layout(title, activePage, content)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' – Powerstaff 2026'">Powerstaff 2026</title>
  <link rel="stylesheet" th:href="@{/generated/app.css}">
</head>
<body>

  <!-- App-Navigation (§5) -->
  <nav id="app-nav">
    <div id="app-nav-inner">
      <div id="nav-logo">Power<span>staff</span> 2026</div>

      <a class="menu-item"
         th:classappend="${activePage == 'freelancer'} ? 'active' : ''"
         th:href="@{/freelancer}">Freiberufler</a>

      <a class="menu-item"
         th:classappend="${activePage == 'partner'} ? 'active' : ''"
         th:href="@{/partner}">Partner</a>

      <a class="menu-item"
         th:classappend="${activePage == 'kunde'} ? 'active' : ''"
         th:href="@{/kunde}">Kunden</a>

      <a class="menu-item"
         th:classappend="${activePage == 'project'} ? 'active' : ''"
         th:href="@{/project}">Projekte</a>

      <a class="menu-item"
         th:classappend="${activePage == 'profilesearch'} ? 'active' : ''"
         th:href="@{/profilesearch}">Profilsuche</a>

      <a class="menu-item"
         th:classappend="${activePage == 'admin'} ? 'active' : ''"
         th:href="@{/admin}">Administration</a>

      <!-- Abstandhalter -->
      <span class="flex-spacer"></span>

      <!-- Logout -->
      <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="menu-item btn-logout">
          <sec:authentication property="name" /> abmelden
        </button>
      </form>
    </div>
  </nav>

  <!-- Content-Slot -->
  <th:block th:replace="${content}"/>

  <script th:src="@{/generated/app.js}"></script>

</body>
</html>
