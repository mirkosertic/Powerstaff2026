<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      th:fragment="layout(title, activePage, content)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" th:content="${_csrf.token}">
  <title th:text="${title} + ' – Powerstaff 2026'">Powerstaff 2026</title>
  <link rel="stylesheet" th:href="@{/generated/app.css}">
  <script>
    (function() {
      var saved = localStorage.getItem('ps-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

  <!-- App-Navigation (§5) -->
  <nav id="app-nav">
    <div id="app-nav-inner">
      <div id="nav-logo">Power<span>staff</span> 2026</div>

      <a class="menu-item"
         th:classappend="${activePage == 'freelancer'} ? 'active' : ''"
         th:href="@{/freelancer}">Freiberufler</a>

      <a class="menu-item"
         th:classappend="${activePage == 'partner'} ? 'active' : ''"
         th:href="@{/partner}">Partner</a>

      <a class="menu-item"
         th:classappend="${activePage == 'kunde'} ? 'active' : ''"
         th:href="@{/kunde}">Kunden</a>

      <a class="menu-item"
         th:classappend="${activePage == 'project'} ? 'active' : ''"
         th:href="@{/project}">Projekte</a>

      <a class="menu-item"
         th:classappend="${activePage == 'profilesearch'} ? 'active' : ''"
         th:href="@{/profilesearch}">Profilsuche</a>

      <a class="menu-item"
         th:classappend="${activePage == 'admin'} ? 'active' : ''"
         th:href="@{/admin}">Administration</a>

      <!-- Abstandhalter -->
      <span class="flex-spacer"></span>

      <!-- Theme-Toggle -->
      <button id="theme-toggle" class="menu-item" type="button"
              aria-label="Farbschema wechseln" title="Dark/Light Mode">
        <span id="theme-icon">◐</span>
      </button>

      <!-- Logout -->
      <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="menu-item btn-logout">
          <sec:authentication property="name" /> abmelden
        </button>
      </form>
    </div>
  </nav>

  <!-- defer: app.js runs after HTML parsing so Custom Elements find their children
       in connectedCallback. Functions called from event handlers (renderMarkdown,
       openModal etc.) are always available by then. -->
  <script th:src="@{/generated/app.js}" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      function updateIcon() {
        icon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '○' : '●';
      }
      updateIcon();
      btn.addEventListener('click', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('ps-theme', next);
        updateIcon();
      });
    });
  </script>

  <!-- Content-Slot -->
  <th:block th:replace="${content}"/>

</body>
</html>
