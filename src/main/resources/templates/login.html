<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerstaff 2026 – Login</title>
  <link rel="stylesheet" th:href="@{/generated/app.css}">
  <style>
    /* Login-spezifisches Layout: zentriertes Formular */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-l);
      box-shadow: var(--shadow-md);
      padding: 2rem;
      width: 340px;
    }
    .login-logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      display: block;
      text-align: center;
    }
    .login-logo span {
      color: var(--pri);
    }
    .login-box .fg {
      margin-bottom: 0.85rem;
    }
    .login-submit {
      width: 100%;
      margin-top: 0.5rem;
    }
    .error {
      font-size: .82rem;
      color: var(--danger);
      background: var(--danger-l);
      border: 1px solid #fca5a5;
      border-radius: var(--r);
      padding: 6px 10px;
      margin-bottom: 1rem;
    }
    .success-msg {
      font-size: .82rem;
      color: var(--ok-text);
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
      border-radius: var(--r);
      padding: 6px 10px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <span class="login-logo">Power<span>staff</span> 2026</span>

    <p th:if="${param.error}" class="error">
      Ungültiger Benutzername oder Passwort.
    </p>
    <p th:if="${param.logout}" class="success-msg">
      Erfolgreich abgemeldet.
    </p>

    <form method="post" th:action="@{/login}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="fg">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>

      <div class="fg">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-pri login-submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
