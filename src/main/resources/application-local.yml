spring:
  datasource:
    url: jdbc:mysql://localhost:3306/powerstaff?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin
    username: powerstaff
    password: powerstaff
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false

  # Session-Cookie ohne Secure-Flag für lokale HTTP-Entwicklung
  session:
    cookie:
      secure: false

# Logging – Entwicklung
logging:
  level:
    de.mirkosertic.powerstaff: DEBUG
    org.springframework: INFO
    org.springframework.jdbc.core: DEBUG
    root: INFO
