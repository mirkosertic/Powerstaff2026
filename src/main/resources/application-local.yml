spring:
  datasource:
    url: jdbc:mysql://localhost:3306/powerstaff?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin
    username: powerstaff
    password: powerstaff
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false

  ai:
    model:
      #chat: "ollama"
      chat: "openai"

    # MCP Client Auto-Konfiguration deaktiviert – manuelles Factory-Pattern
    mcp:
      client:
        enabled: false
    # Alte Config (nicht mehr verwendet):
    #   streamable-http:
    #     connections:
    #       lucene-search:
    #        url: http://localhost:9000
    #        endpoint: /mcp/message

    openai:
      base-url: http://localhost:1234
      api-key: "dummy"
      chat:
        options:
          model: unsloth-deepseek-r1-distill-qwen-14b
          temperature: 0.7
          stream-usage: true
    #ollama:
    #  base-url: http://localhost:11434
    #  init:
    #    pull-model-strategy: when_missing
    #    timeout: 60s
    #    max-retries: 1
    #  chat:
    #    options:
    #      model: qwen3.5:9b
          # model: ministral-3:8b
          # model: ministral-3:14b

# Logging – Entwicklung
logging:
  level:
    de.mirkosertic.powerstaff: DEBUG
    org.springframework: INFO
    org.springframework.jdbc.core: DEBUG
    root: INFO

server:
  servlet:
    session:
      cookie:
        secure: false
        same-site: lax

# MCP (Model Context Protocol) – Entwicklung: aktiviert mit Retry-Logik
powerstaff:
  mcp:
    enabled: true
    url: http://localhost:9000
    endpoint: /mcp/message
    request-timeout: 10s
    max-retries: 2
    retry-delay: 500ms
