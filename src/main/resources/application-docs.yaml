spring:
  datasource:
    url: jdbc:mysql://localhost:3316/powerstaff_e2e
    username: powerstaff
    password: powerstaff
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    locations: classpath:db/migration,classpath:db/testdata
  lifecycle:
    timeout-per-shutdown-phase: 5s

server:
  servlet:
    session:
      cookie:
        secure: false
        same-site: lax
  # Graceful shutdown ensures JVM shutdown hooks (incl. JaCoCo) run before the process exits.
  # Without this, Playwright's SIGTERM may be followed by SIGKILL before JaCoCo writes jacoco-e2e.exec.
  shutdown: graceful

# Actuator – in E2E-Modus: Shutdown-Endpoint aktivieren damit global-teardown.ts
# einen kontrollierten JVM-Shutdown auslösen kann, bevor Playwright den Prozess killt.
# Nur so schreibt der JaCoCo-Agent zuverlässig die jacoco-e2e.exec Datei.
management:
  endpoints:
    web:
      exposure:
        include: health, shutdown
  endpoint:
    shutdown:
      enabled: true
    health:
      show-details: always
