name: Build and Release

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('src/test/e2e/package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-

    - name: Install E2E npm dependencies
      run: npm ci
      working-directory: src/test/e2e

    - name: Install Playwright system dependencies
      run: |
        sudo systemctl stop unattended-upgrades || true
        sudo systemctl disable unattended-upgrades || true
        sudo apt-get -y -q purge unattended-upgrades || true
        npx playwright install-deps chromium firefox
      working-directory: src/test/e2e
      timeout-minutes: 5

    - name: Install Playwright browsers
      run: npx playwright install chromium firefox
      working-directory: src/test/e2e
      timeout-minutes: 10

    - name: Build with Maven
      run: ./mvnw clean package verify

    - name: Deploy Playwright Report to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      if: always()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: gh-pages
        folder: target/site
        clean: true

    - name: Get project version
      id: get_version
      run: |
        VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Project version: $VERSION"

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v7
      with:
        name: powerstaff2026-${{ steps.get_version.outputs.version }}
        path: target/powerstaff-*.jar
        if-no-files-found: error
        retention-days: 90

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: mirkosertic42/powerstaff2026

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push
      id: push
      uses: docker/build-push-action@v7
      with:
        platforms: linux/amd64, linux/arm64
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: true

    - name: Generate artifact attestation
      uses: actions/attest@v4
      with:
        subject-name: index.docker.io/mirkosertic42/powerstaff2026
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
