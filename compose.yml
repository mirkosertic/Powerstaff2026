services:
  mysql:
    image: mysql:8.0
    container_name: powerstaff-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: powerstaff
      MYSQL_USER: powerstaff
      MYSQL_PASSWORD: powerstaff
    ports:
      - "3306:3306"
    volumes:
      - ./powerstaff_mysql_data:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "powerstaff", "-ppowerstaff"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  onnx:
    image: mirkosertic42/mcpluceneserver_onnx:main
    container_name: powerstaff-lucenemcp-onnx-models
    volumes:
      - onnx-models:/onnxmodels
  lucene-mcp:
    image: mirkosertic42/mcpluceneserver:main
    container_name: powerstaff-lucenemcp
    ports:
      - "9000:9000"
    volumes:
      - ./lucene_mcp_data:/userdata:rw
      - onnx-models:/onnxmodels:ro
    environment:
      SPRING_PROFILES_ACTIVE: "deployed"
      LUCENE_TOOLS_INCLUDE: "search,semantic,debug,getDocumentDetails"
      VECTOR_MODEL: "e5-base"
      ONNX_MODELS_PATH: "/onnxmodels"
    depends_on:
      mysql:
        condition: service_healthy
      onnx:
        condition: service_started

  mysql-backup:
    image: fradelg/mysql-cron-backup
    container_name: powerstaff-mysql-backup
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: powerstaff
      MYSQL_PASS: powerstaff
      MYSQL_DB: powerstaff
      CRON_TIME: "0 3 * * *"
      MAX_BACKUPS: "7"
      INIT_BACKUP: "1"
      MYSQLDUMP_OPTS: "--no-tablespaces"
    volumes:
      - ./powerstaff_mysql_backups_data:/backup:rw
    restart: unless-stopped

