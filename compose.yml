services:
  mysql:
    image: mysql:8.0
    container_name: powerstaff-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: powerstaff
      MYSQL_USER: powerstaff
      MYSQL_PASSWORD: powerstaff
    ports:
      - "3306:3306"
    volumes:
      - ./powerstaff_mysql_data:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "powerstaff", "-ppowerstaff"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  lucene-mcp:
    image: mirkosertic42/mcpluceneserver:main
    container_name: powerstaff-lucenemcp
    ports:
      - "11000:9000"
    volumes:
      - ./lucene_mcp_data:/userdata:rw
  ollama:
    image: ollama/ollama
    container_name: powerstaff-ollama
    environment:
      OLLAMA_MODELS: /opt/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/opt/ollama:rw
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # Hinweis: macOS (Docker Desktop) unterstützt kein GPU-Passthrough –
    # für Metal-Beschleunigung Ollama nativ (außerhalb Docker) betreiben.