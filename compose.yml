services:
  mysql:
    image: mysql:8.0
    container_name: powerstaff-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: powerstaff
      MYSQL_USER: powerstaff
      MYSQL_PASSWORD: powerstaff
    ports:
      - "3306:3306"
    volumes:
      - powerstaff_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "powerstaff", "-ppowerstaff"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  powerstaff_mysql_data:
